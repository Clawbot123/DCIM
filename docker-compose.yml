version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dcim
      POSTGRES_USER: dcim
      POSTGRES_PASSWORD: dcim_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcim"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --settings=dcim.settings.production &&
             python manage.py collectstatic --noinput --settings=dcim.settings.production &&
             gunicorn dcim.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: dcim.settings.production
      SECRET_KEY: change-this-in-production-use-env-file
      DEBUG: "False"
      DB_HOST: db
      DB_NAME: dcim
      DB_USER: dcim
      DB_PASSWORD: dcim_password
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A dcim worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: dcim.settings.production
      SECRET_KEY: change-this-in-production-use-env-file
      DB_HOST: db
      DB_NAME: dcim
      DB_USER: dcim
      DB_PASSWORD: dcim_password
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_files:
  media_files:
